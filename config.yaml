# =====================================================================
#  Yollo - 라즈베리 파이 5 분리수거 인식 시스템 설정
#  (모든 모듈이 이 한 파일을 공유한다 → 임계값/경로를 한 곳에서 관리)
# =====================================================================

# --- 클래스 정의 (간단 4종) -------------------------------------------
# id 순서는 학습 dataset.yaml 의 names 순서와 반드시 일치해야 함.
classes:
  0: plastic   # 플라스틱
  1: can       # 캔
  2: glass     # 유리
  3: paper     # 종이

# 한글 표시용 라벨 (리포트/오버레이에 사용)
labels_ko:
  plastic: 플라스틱
  can: 캔/고철류
  glass: 병(유리)
  paper: 일반쓰레기

# --- 이 장치가 담당하는 수거함 ----------------------------------------
# bin_target 에 해당하지 않는 클래스가 잡히면 '오분류(misclassification)'로 기록.
# null 이면 모든 클래스를 정상으로 간주(분류 안내용 키오스크 모드).
bin:
  target: plastic        # 이 통은 '플라스틱' 전용. (캔/유리/종이가 들어오면 오분류)
  capacity_items: 200    # 통이 가득 찼다고 보는 누적 아이템 수 (fill 예측용)

# --- 장치/지역 정보 -----------------------------------------------------
# 이 장치가 설치된 지역명. 모든 이벤트에 함께 기록되어 대시보드에서
# 지역별 필터링/비교에 사용된다. (예: "서울-강남", "부산-해운대")
device:
  id: pi-01
  region: AI공학관

# --- 중앙 서버 연동 (선택) -----------------------------------------------
# 여러 지역(장치)의 데이터를 한 대시보드에서 보려면, 중앙 서버 PC에서
# `python scripts/server.py` 를 실행해두고 각 장치에서 enabled: true +
# url 을 그 서버 주소로 설정한다. 로컬 DB 기록은 그대로 유지되며,
# 동시에 같은 이벤트가 중앙 DB로도 전송된다.
server:
  enabled: false
  url: http://<central-server-ip>:8000/api/events
  timeout_sec: 2        # 네트워크 문제 시 실시간 루프가 멈추지 않도록 짧게

# --- 모델 / 추론 -------------------------------------------------------
model:
  # 학습 결과(.pt) 또는 Pi5 배포용 NCNN/ONNX 경로. 자동으로 포맷 판별.
  #   PC 학습:  models/yolo11n_recycle.pt
  #   Pi5 배포: models/yolo11n_recycle_ncnn_model   (export_ncnn.py 산출물)
  weights: models/yolo11n_recycle_ncnn_model
  imgsz: 640
  device: cpu            # Pi5 는 cpu. (PC GPU 테스트 시 0)

# --- 신뢰도(confidence) 정책 : 4개 분석 기능이 공유하는 핵심 신호 -----
confidence:
  detect: 0.35           # 이 값 미만은 탐지 자체를 버림
  trusted: 0.65          # 이 값 이상이면 '확실한 탐지'로 신뢰
  # detect ~ trusted 사이(0.35~0.65)는 '애매 구간' →
  #   · 오염/오분류 후보로 표시
  #   · 능동학습용 이미지로 자동 저장

# --- 시간적 일관성(temporal) : 같은 물체를 프레임 간 추적 -------------
tracking:
  stable_frames: 3       # 같은 클래스가 N프레임 연속 잡혀야 '확정 카운트' (중복/노이즈 제거)
  flicker_is_uncertain: true  # 프레임 간 클래스가 흔들리면 모델 불확실 → 능동학습 1순위

# --- 능동학습(자동 데이터 수집) ---------------------------------------
active_learning:
  enabled: true
  save_dir: captured/active_learning
  save_crops: true       # 객체 crop 도 같이 저장
  cooldown_sec: 5        # 동일 상황 연속 저장 방지 (스토리지 절약)
  max_per_day: 500       # 하루 저장 상한

# --- 데이터 로깅 -------------------------------------------------------
database:
  path: data/events.db   # 모든 탐지 이벤트가 쌓이는 단일 SQLite

# --- 리포트 ------------------------------------------------------------
report:
  out_dir: reports
  timezone: Asia/Seoul

# --- 카메라 -----------------------------------------------------------
camera:
  source: 0              # 0=기본 웹캠 / "picamera2"=Pi 카메라모듈 / 파일경로=동영상
  width: 1280
  height: 720
  fps: 15
